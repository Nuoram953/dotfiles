set -s default-terminal tmux-256color
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[2 q'

set -g mouse on

set -g prefix C-a
bind C-a send-prefix

set -g update-environment "PATH"

set-option -g status-position top

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'aserowy/tmux.nvim'
set -g @plugin 'Morantron/tmux-fingers'

set-option -g status-interval 5
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle true
set -g @tmux-nvim-navigation-keybinding-left 'C-h'
set -g @tmux-nvim-navigation-keybinding-down 'C-j'
set -g @tmux-nvim-navigation-keybinding-up 'C-k'
set -g @tmux-nvim-navigation-keybinding-right 'C-l'

# resize
set -g @tmux-nvim-resize true
set -g @tmux-nvim-resize-step-x 1
set -g @tmux-nvim-resize-step-y 1
set -g @tmux-nvim-resize-keybinding-left 'M-h'
set -g @tmux-nvim-resize-keybinding-down 'M-j'
set -g @tmux-nvim-resize-keybinding-up 'M-k'
set -g @tmux-nvim-resize-keybinding-right 'M-l'

run '~/.tmux/plugins/tpm/tpm'
set-option -g default-shell /bin/fish

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

bind -n M-Left  previous-window
bind -n M-Right next-window

bind-key X kill-window

bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded."

# Toggle popup: press the same key to open OR to hide (detach-client keeps the app alive).
# Quit the app entirely with q / normal quit inside the app.
bind-key -r g if-shell '[ "#{session_name}" = "popup-lazygit" ]' \
    'detach-client' \
    'display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "tmux new-session -d -s popup-lazygit lazygit 2>/dev/null; tmux set-option -t popup-lazygit status off; tmux attach-session -t popup-lazygit"'
bind-key -r d if-shell '[ "#{session_name}" = "popup-lazydocker" ]' \
    'detach-client' \
    'display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "tmux new-session -d -s popup-lazydocker lazydocker 2>/dev/null; tmux set-option -t popup-lazydocker status off; tmux attach-session -t popup-lazydocker"'
bind-key -r b if-shell '[ "#{session_name}" = "popup-btop" ]' \
    'detach-client' \
    'display-popup -d "#{pane_current_path}" -w 85% -h 85% -E "tmux new-session -d -s popup-btop btop 2>/dev/null; tmux set-option -t popup-btop status off; tmux attach-session -t popup-btop"'
bind-key -r s display-popup -d '#{pane_current_path}' -w 50% -h 50% -E "env TMUX_POPUP=1 ~/dotfiles/bin/.local/scripts/tmux-sessionizer"
bind-key -r w display-popup -d '#{pane_current_path}' -w 50% -h 50% -E "env TMUX_POPUP=1 ~/dotfiles/bin/.local/scripts/web-selector.sh"

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

setw -g clock-mode-colour colour1

setw -g mode-style 'fg=colour1 bg=colour18 bold'

